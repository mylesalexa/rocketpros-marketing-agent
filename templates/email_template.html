<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RocketPros Daily Articles</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      margin: 0;
      padding: 0;
    }
    .wrapper {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 16px;
    }
    .header {
      border-bottom: 2px solid #06b6d4;
      padding-bottom: 20px;
      margin-bottom: 32px;
    }
    .header h1 {
      color: #06b6d4;
      font-size: 22px;
      margin: 0 0 6px 0;
      font-weight: 700;
    }
    .header p {
      color: #94a3b8;
      margin: 0;
      font-size: 14px;
    }
    .article-block {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 28px;
      margin-bottom: 40px;
    }
    .article-number {
      display: inline-block;
      background: #06b6d4;
      color: #0f1117;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }
    .article-title {
      font-size: 20px;
      font-weight: 700;
      color: #f1f5f9;
      margin: 0 0 6px 0;
      line-height: 1.3;
    }
    .article-meta {
      color: #64748b;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .article-meta span {
      margin-right: 16px;
    }
    .abstract {
      color: #94a3b8;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 20px;
      padding-left: 14px;
      border-left: 3px solid #8b5cf6;
    }
    .key-findings {
      margin-bottom: 24px;
    }
    .key-findings h3 {
      color: #06b6d4;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 0 0 10px 0;
    }
    .key-findings ul {
      margin: 0;
      padding-left: 20px;
    }
    .key-findings li {
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 4px;
    }
    .hero-image {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 24px;
      border: 1px solid #2d3748;
    }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8b5cf6;
      margin: 24px 0 10px 0;
      padding-top: 20px;
      border-top: 1px solid #2d3748;
    }
    .linkedin-post {
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      font-size: 14px;
      color: #cbd5e1;
      line-height: 1.6;
      white-space: pre-wrap;
      font-family: inherit;
    }
    .linkedin-variant-label {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .code-block {
      background: #0a0d16;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 16px;
      font-family: 'Courier New', 'Consolas', monospace;
      font-size: 12px;
      color: #a5f3fc;
      line-height: 1.5;
      overflow-x: auto;
      white-space: pre;
    }
    .publish-steps {
      background: #0f2a1a;
      border: 1px solid #16a34a;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
    }
    .publish-steps h4 {
      color: #4ade80;
      font-size: 13px;
      margin: 0 0 10px 0;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .publish-steps ol {
      margin: 0;
      padding-left: 20px;
    }
    .publish-steps li {
      color: #86efac;
      font-size: 13px;
      line-height: 1.7;
      margin-bottom: 2px;
    }
    .publish-steps code {
      background: #052e16;
      padding: 1px 5px;
      border-radius: 3px;
      font-family: monospace;
      font-size: 12px;
    }
    .footer {
      text-align: center;
      color: #475569;
      font-size: 12px;
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid #1e293b;
    }
    .validation-warning {
      background: #2d1a00;
      border: 1px solid #f59e0b;
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #fcd34d;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>🚀 RocketPros Daily Articles</h1>
      <p>{{date}} &mdash; {{article_count}} article(s) ready for review</p>
    </div>

    {{article_blocks}}

    <div class="footer">
      <p>Generated by RocketPros Marketing Agent &mdash; Railway PRO</p>
      <p>Review, approve, and publish at your discretion.</p>
    </div>
  </div>
</body>
</html>
